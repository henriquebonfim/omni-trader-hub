services:
  omnitrader:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnitrader
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config:/app/config
      - ./backend/data:/app/data
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  watchdog:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnitrader-watchdog
    command: python -m src.watchdog
    volumes:
      - ./backend/config:/app/config
    env_file:
      - .env
    depends_on:
      omnitrader:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnitrader-celery
    command: celery -A src.workers worker --loglevel=info --concurrency=2 --queues=celery
    volumes:
      - ./backend/config:/app/config
      - ./backend/src:/app/src
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "src.workers", "inspect", "ping", "-t", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omnitrader-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package.json:/app/package.json
      - ./frontend/bun.lockb:/app/bun.lockb
    depends_on:
      omnitrader:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    # image: postgres:18-alpine
    image: postgres:15-alpine
    container_name: omnitrader-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnitrader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnitrader_password}
      POSTGRES_DB: ${POSTGRES_DB:-trades_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-omnitrader} -d ${POSTGRES_DB:-trades_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: omnitrader-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.15.2
    container_name: omnitrader-ollama
    environment:
      - OLLAMA_DEBUG=1
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  postgres_data:
  redis_data:
  ollama_data:
