services:
  omnitrader:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnitrader
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config:/app/config
      - ./backend/data:/app/data
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    env_file:
      - .env
    depends_on:
      memgraph:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  watchdog:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnitrader-watchdog
    command: python -m src.watchdog
    volumes:
      - ./backend/config:/app/config
    environment:
      - WATCHDOG_HEALTH_URL=http://omnitrader:8000/api/health
    env_file:
      - .env
    depends_on:
      omnitrader:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnitrader-celery
    command: celery -A src.workers worker --loglevel=info --concurrency=2 --queues=celery
    volumes:
      - ./backend/config:/app/config
      - ./backend/src:/app/src
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "src.workers", "inspect", "ping", "-t", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omnitrader-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package.json:/app/package.json
      - ./frontend/bun.lockb:/app/bun.lockb
    depends_on:
      omnitrader:
        condition: service_healthy
    restart: unless-stopped

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    volumes:
      - ./frontend:/app
    working_dir: /app
    profiles:
      - test

  memgraph:
    image: memgraph/memgraph-mage:3.8.0-relwithdebinfo
    container_name: omnitrader-memgraph
    ports:
      - "7687:7687"
    volumes:
      - memgraph_data:/var/lib/memgraph
    environment:
      - MEMGRAPH_DATA_DIR=/var/lib/memgraph
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',7687)); s.close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  memgraph-lab:
    image: memgraph/lab:latest
    container_name: omnitrader-memgraph-lab
    ports:
      - "3001:3000"
    depends_on:
      memgraph:
        condition: service_healthy
    environment:
      - NEXTAUTH_URL=http://localhost:3001
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: omnitrader-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.17.6
    container_name: omnitrader-ollama
    environment:
      - OLLAMA_DEBUG=1
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  memgraph_data:
  redis_data:
  ollama_data:
