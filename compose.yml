services:
  omnitrader:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnitrader
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      memgraph:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  watchdog:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnitrader-watchdog
    command: python -m src.watchdog
    environment:
      - WATCHDOG_HEALTH_URL=http://omnitrader:8000/api/health
    env_file:
      - .env
    depends_on:
      omnitrader:
        condition: service_started
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnitrader-celery
    command: celery -A src.workers worker --loglevel=info --concurrency=2 --queues=celery
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "src.workers", "inspect", "ping", "-t", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omnitrader-frontend
    ports:
      - "3000:80"
    depends_on:
      omnitrader:
        condition: service_started
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph-mage:3.8.0-relwithdebinfo
    container_name: omnitrader-memgraph
    ports:
      - "7687:7687"
    volumes:
      - memgraph_data:/var/lib/memgraph
    environment:
      - MEMGRAPH_DATA_DIR=/var/lib/memgraph
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'RETURN 1;' | timeout 5 mgconsole >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  memgraph-lab:
    image: memgraph/lab:latest
    container_name: omnitrader-memgraph-lab
    ports:
      - "3001:3000"
    depends_on:
      memgraph:
        condition: service_healthy
    environment:
      - NEXTAUTH_URL=http://localhost:3001
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: omnitrader-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.17.6
    container_name: omnitrader-ollama
    environment:
      - OLLAMA_DEBUG=1
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  memgraph_data:
  redis_data:
  ollama_data:
