services:
  ollama:
    image: ollama/ollama:0.15.2
    container_name: omnitrader-ollama
    environment:
      - OLLAMA_DEBUG=1
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ollama_data:
