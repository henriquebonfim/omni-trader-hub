services:
  omnitrader:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnitrader
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config:/app/config
      - ./backend/data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omnitrader-frontend
    ports:
      - "3000:80"
    depends_on:
      omnitrader:
        condition: service_healthy
    restart: unless-stopped
