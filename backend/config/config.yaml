database:
  encrypted: false
  host: ${MEMGRAPH_HOST}
  password: ${MEMGRAPH_PASSWORD}
  port: ${MEMGRAPH_PORT}
  type: memgraph
  username: ${MEMGRAPH_USERNAME}
backtest:
  slippage_bps: 2.0  # 2 bps = 0.02%
  spread_bps: 1.0    # 1 bps = 0.01%
exchange:
  adapter: ccxt
  leverage: 3
  margin_type: isolated
  name: binance
  paper_mode: true
  testnet: false
graph:
  cryptopanic_api_key: ${CRYPTOPANIC_API_KEY}
  fear_greed_polling_interval: 300
  news_polling_interval: 60
  news_ttl_days: 7
  ollama_model: llama3:8b
  ollama_timeout: 30
  rss_polling_interval: 300
  sentiment_aggregation_days: 30
notifications:
  alert_rules:
    circuit_breaker: true
    pnl_critical_pct: 5.0
    pnl_thresholds: true
    pnl_warning_pct: 3.0
    regime_change: true
    strategy_rotation: true
  discord_webhook: ${DISCORD_WEBHOOK_URL}
  enabled: true
redis:
  db: 1
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}
risk:
  atr_multiplier_sl: 1.5
  atr_multiplier_tp: 2.0
  atr_period: 14
  liquidation_buffer_pct: 0.5
  max_daily_loss_pct: 5.0
  max_positions: 50
  reconciliation_lookback_trades: 50
  stop_loss_pct: 2.0
  take_profit_pct: 4.0
  trailing_stop_activation_pct: 1.0
  trailing_stop_callback_pct: 0.5
  use_atr_stops: true
strategy:
  adx_period: 14
  adx_threshold: 25
  bollinger_bands:
    length: 20
    rsi_length: 14
    rsi_lower: 30
    rsi_upper: 70
    std: 2.0
  breakout:
    period: 20
  ema_fast: 10
  ema_slow: 21
  name: ema_volume
  smc_confirmation: false
  smc_swing_window: 5
  smc_timeframe: 4h
  volume_sma: 20
  volume_threshold: 1.5
  z_score_threshold: 2.0
  z_score_window: 20
trading:
  cycle_seconds: 30
  ohlcv_limit: 100
  position_size_pct: 2.0
  symbol: BTC/USDT:USDT
  timeframe: 15m
