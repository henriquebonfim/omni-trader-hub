exchange:
  leverage: 3
  margin_type: isolated
  name: binance
  paper_mode: true
  testnet: false
notifications:
  discord_webhook: ${DISCORD_WEBHOOK_URL}
  enabled: true
risk:
  atr_multiplier_sl: 1.5
  atr_multiplier_tp: 2.0
  atr_period: 14
  liquidation_buffer_pct: 0.5
  max_daily_loss_pct: 5.0
  max_positions: 50
  reconciliation_lookback_trades: 50
  stop_loss_pct: 2.0
  take_profit_pct: 4.0
  trailing_stop_activation_pct: 1.0
  trailing_stop_callback_pct: 0.5
  use_atr_stops: true
strategy:
  adx_period: 14
  adx_threshold: 25
  bollinger_bands:
    length: 20
    rsi_length: 14
    rsi_lower: 30
    rsi_upper: 70
    std: 2.0
  breakout:
    period: 20
  ema_fast: 10
  ema_slow: 21
  name: adx_trend
  volume_sma: 20
  volume_threshold: 1.5
  z_score_threshold: 2.0
  z_score_window: 20
trading:
  cycle_seconds: 30
  ohlcv_limit: 100
  position_size_pct: 2.0
  symbol: BTC/USDT:USDT
  timeframe: 15m
