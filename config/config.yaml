trading:
  symbol: BTC/USDT:USDT
  timeframe: 15m
  position_size_pct: 2.0
  cycle_seconds: 60
  ohlcv_limit: 100

strategy:
  name: ema_volume
  ema_fast: 9
  ema_slow: 21
  volume_sma: 20
  volume_threshold: 1.5
  trend_filter_enabled: false
  trend_timeframe: 4h
  bias_confirmation: true
  bias_timeframe: 4h

risk:
  stop_loss_pct: 2.0
  take_profit_pct: 4.0
  max_daily_loss_pct: 5.0
  max_weekly_loss_pct: 10.0
  max_positions: 1
  liquidation_buffer_pct: 0.5
  trailing_stop_activation_pct: 1.0
  trailing_stop_callback_pct: 0.5
  reconciliation_lookback_trades: 50

exchange:
  paper_mode: true
  leverage: 3
  margin_type: isolated

database:
  type: postgres
  connection_string: "postgresql://omnitrader:omnitrader_password@postgres:5432/trades_db"

notifications:
  discord_webhook_url: ""
